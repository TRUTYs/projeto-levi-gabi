{% extends "base.html" %}
{% block title %}Minha Senha — Eight Sistemas{% endblock %}
{% block page_title %}Minha Conta{% endblock %}
{% block page_sub %}Alterar senha de acesso{% endblock %}

{% block content %}
<div class="tcard" style="max-width:480px;">
  <div class="tcard-header">
    <span class="tcard-title">Alterar minha senha</span>
  </div>
  <div style="padding:20px 22px;">
    <form action="{{ url_for('configuracoes.alterar_senha') }}" method="POST">
      <div class="form-grid" style="grid-template-columns:1fr;">
        <div class="form-group">
          <label>Senha atual</label>
          <input type="password" name="senha_atual" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label>Nova senha</label>
          <input type="password" name="senha_nova" placeholder="mín. 6 caracteres" required>
        </div>
        <div class="form-group">
          <label>Confirmar nova senha</label>
          <input type="password" name="senha_confirma" placeholder="repita a nova senha" required>
        </div>
      </div>
      <div class="form-actions" style="margin-top:14px;">
        <button type="submit" class="btn btn-blue">Alterar Senha</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
