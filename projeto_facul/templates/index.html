<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eight Sistemas - Home</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            text-align: center; 
            background-color: #012a4a;
        }

        .header { 
            background-color: #3b4cca;
            border-bottom: 3px solid #3b4cca; 
            padding: 20px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 10px;
            text-align: center;
        }

        

        .gestao{
            margin-left: auto;

        }

        .titulo{
            margin-right: auto;
            
        }

        .menu-container { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-top: 100px; 
        }

        .btn-card {
            width: 220px; 
            height: 140px;
            border: 2px solid #222;
            border-radius: 10px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold; 
            font-size: 1.1rem;
            text-decoration: none; 
            color: black;
            transition: transform 0.2s;
        }

        .btn-card:hover { 
            transform: scale(1.05); 
        }

        .laranja { background-color: #ff8533; }
        .azul    { background-color: #00a2ed; }
        .verde   { background-color: #2ecc71; }

        .footer { 
            margin-top: 150px; 
            color: #f4f4f4; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div id="logo"></div>
        </div>
        <span class = "titulo" style = "color: #f4f4f4; font-weight: bold;">EIGHT SISTEMAS</span>
        <span class = "gestao" style = "color: #f4f4f4; font-weight: bold;">GESTÃO DE ESTOQUE</span>
    </div>

    <div class="menu-container">
        <a href="/estoque"     class="btn-card laranja">📦ESTOQUE</a>
        <a href="/movimento"   class="btn-card azul">📊MOVIMENTO &amp; DASHBOARD</a>
        <a href="/fornecedores" class="btn-card verde">🚚FORNECEDORES</a>
    </div>

    <div class="footer">EIGHT SISTEMAS &copy; 2026</div>
</body>
</html>
